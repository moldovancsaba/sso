name: Repo Guardrails

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  guardrails:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enforce repository guardrails
        run: node scripts/check-repo-guardrails.mjs

      - name: Check documentation maintenance rules
        run: node scripts/check-docs-maintenance.mjs

      - name: Run contract tests
        run: node --experimental-vm-modules ./node_modules/jest/bin/jest.js --runInBand --passWithNoTests
